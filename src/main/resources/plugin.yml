name: HControl
version: '1.0.0'
main: hcontrol.plugin.Main
api-version: '1.20'
author: YourName
description: HControl Tu Tien RPG System 

commands:
  stat:
    description: Check your cultivation stats
    usage: /stat
    permission: hcontrol.use
  tuvi:
    description: Xem va them tu vi (cultivation)
    usage: /tuvi [add <amount>]
    permission: hcontrol.admin
  dokiep:
    description: Do kiep - breakthrough len dai canh gioi moi (tribulation)
    usage: /dokiep
    permission: hcontrol.use
    
  ascend:
    description: Ascension - thang cap endgame sau CHAN TIEN level 10
    usage: /ascend [info]
    aliases: [ascension, thangcap]
    permission: hcontrol.use
    
  worldboss:
    description: World Boss system - quản lý world boss (ENDGAME)
    usage: /worldboss [spawn|info|force]
    aliases: [wb, boss]
    permission: hcontrol.admin
   
  hc:
    description: HControl main command
    usage: /hc [profile|addexp|setlevel|reset|reload]
    permission: hcontrol.admin
  hc:
    description: HControl main admin command
    usage: /hc [profile]
    permission: hcontrol.use
    
    
  spawnboss:
    description: Spawn test boss (debug)
    usage: /spawnboss <name> [type]
    permission: hcontrol.admin
    
  title:
    description: Quan ly danh hieu
    usage: /title [list|equip|unequip]
    aliases: [danhhieu]
    permission: hcontrol.use
    
  unlock:
    description: Mo khoa dieu kien level up (quest/kill/achievement/pill)
    usage: /unlock [quest|kill|achievement|pill|force]
    aliases: [mokhoa]
    permission: hcontrol.admin
    
  role:
    description: Xem va set role (title) cua chinh minh
    usage: /role | /role <role> | /role remove
    permission: hcontrol.use
  setrole:
    description: Set role cho player khac (admin only)
    usage: /setrole <player> <role> | /setrole <player> remove | /setrole clearall | /setrole list
    permission: hcontrol.admin
    
  aidebug:
    description: AI debug commands (testing)
    usage: /aidebug [info|clear]
    aliases: [aid]
    permission: hcontrol.admin
    
  itemtest:
    description: Item test commands (PHASE 8A testing)
    usage: /itemtest [equip|unequip|stats|list]
    aliases: [itest, itemdebug]
  class:
    description: Class system command (PHASE 5)
    usage: /class <set|info|list> [classType]
    permission: op
    permission: hcontrol.admin
    
  skill:
    description: Player skill system (PHASE 6)
    usage: /skill [list|available|learn|cast|bind|unbind|hotbar|info]
    aliases: [sk, skills]
    permission: hcontrol.use
    
  skillbook:
    description: Tao skill book item (admin)
    usage: /skillbook <skillId> [rarity] [player]
    aliases: [bikip]
    permission: hcontrol.admin
    
  sect:
    description: Sect system - Mon phai
    usage: /sect [create|info|list|join|leave|invite|kick|promote|demote|transfer|disband|members]
    aliases: [monphai, guild]
    permission: hcontrol.use
    
  master:
    description: Master-Disciple system - Bai su
    usage: /master [request|accept|deny|invite|join|decline|leave|kick|teach|list|toggle|title|disciples]
    aliases: [sufu, baisu, disciple]
    permission: hcontrol.use
    
  askill:
    description: Admin skill commands - backdoor
    usage: /askill [list|info|give|remove|setmastery|setrefinement|create|delete|reload|bypass|instances|stats]
    aliases: [adminskill, as]
    permission: hcontrol.admin.skill
    
  hadmin:
    description: HControl Admin - backdoor tong hop
    usage: /hadmin [player|realm|sect|master|reload|stats]
    aliases: [hca, hcontroladmin]
    permission: hcontrol.admin
    
  nameplate:
    description: Nameplate system - Hien thi ten
    usage: /nameplate [toggle|refresh]
    aliases: [np, bangten]
    permission: hcontrol.use
    
  bubbletest:
    description: Test chat bubble - Hien thi bubble tren dau player
    usage: /bubbletest <message> [duration]
    aliases: [btest, chatbubble]
    permission: hcontrol.use

permissions:
  hcontrol.use:
    description: Use basic commands
    default: true
    
  hcontrol.admin:
    description: Admin commands
    default: op
    
  hcontrol.admin.skill:
    description: Admin skill system commands (backdoor)
    default: op
